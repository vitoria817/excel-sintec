<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>SINTEC - Notas de Entrada</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<header class="app-header">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="16" y1="13" x2="8" y2="13"/>
    <line x1="16" y1="17" x2="8" y2="17"/>
  </svg>
  <h1>Notas de Entrada • SINTEC</h1>
  <span id="liveClock"></span>
</header>

<section class="filter-section">
  <div class="filter-grid">
    <div class="filter-group">
      <label>🏢 Empresa</label>
      <select id="f_empresa"><option value="">Todas</option></select>
    </div>
    <div class="filter-group">
      <label>📅 Início</label>
      <input type="date" id="f_dtinicio" />
    </div>
    <div class="filter-group">
      <label>📅 Fim</label>
      <input type="date" id="f_dtfim" />
    </div>
    <div class="filter-group">
      <label>🔢 Fornecedor (ID)</label>
      <input type="number" id="f_fornecedor" placeholder="ID" />
    </div>
    <div class="filter-group">
      <label>🔢 Cliente (ID)</label>
      <input type="number" id="f_cliente" placeholder="ID" />
    </div>
    <div class="filter-group btn-row">
      <button class="btn btn-primary" onclick="buscarNotas()">🔍 Buscar</button>
      <button class="btn btn-outline" onclick="limparFiltros()">🗑️ Limpar</button>
    </div>
  </div>
  <div style="display: flex; gap: 16px; margin-top: 12px; padding-left: 6px;">
    <span id="lbl_fornecedor" class="pessoa-label"></span>
    <span id="lbl_cliente" class="pessoa-label"></span>
  </div>
</section>

<div class="action-bar">
  <button class="btn btn-success btn-excel" id="btnExport" onclick="exportarExcel()" disabled>📎 Exportar Excel</button>
  <div class="result-badge" id="resultCount"></div>
</div>

<div class="table-container" id="tableArea">
  <div class="state-msg">
    <p>🔍 Aguardando consulta...</p>
  </div>
</div>

<div class="totals-bar" id="summaryBar" style="display: none;">
  <div class="total-item"><span>📄 NOTAS</span><strong id="totNotas">0</strong></div>
  <div class="total-item"><span>💰 VALOR NOTA</span><strong id="totValnota">R$ 0,00</strong></div>
  <div class="total-item"><span>📦 PRODUTOS</span><strong id="totProdutos">R$ 0,00</strong></div>
  <div class="total-item"><span>🧾 BASE ICMS</span><strong id="totBaseIcms">R$ 0,00</strong></div>
  <div class="total-item"><span>⚖️ ICMS</span><strong id="totIcms">R$ 0,00</strong></div>
  <div class="total-item"><span>🏭 BASE IPI</span><strong id="totBaseIpi">R$ 0,00</strong></div>
  <div class="total-item"><span>🏷️ IPI</span><strong id="totIpi">R$ 0,00</strong></div>
  <div class="total-item"><span>🚛 FRETE</span><strong id="totFrete">R$ 0,00</strong></div>
  <div class="total-item"><span>💰 DESCONTO</span><strong id="totDesconto">R$ 0,00</strong></div>
</div>

<script src="app.js"></script>
</body>
</html>
